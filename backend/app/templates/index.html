<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Construct-DCAT Starter</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Construct-DCAT Onboarding</h1>
        <p>Edit your dataset payload, validate it, export RDF, and discuss schema changes visually, as well as SHACL generation.</p>
      </header>

      <section class="panel">
        <div class="toolbar">
          <button id="load-example">Load example</button>
          <button id="validate">Validate</button>
          <button id="export-jsonld">Export JSON-LD</button>
          <button id="export-turtle">Export Turtle</button>
          <button onclick="exportSHACL()">Export SHACL</button>
          <button onclick="exportSchemaRDF()">Export Schema RDF</button>
        </div>
        <label for="payload">Dataset payload</label>
        <textarea id="payload" spellcheck="false">{{ example | tojson(indent=2) }}</textarea>
      </section>

      <section class="grid">
        <div class="panel">
          <h2>Validation</h2>
          <pre id="validation-output">Ready.</pre>
        </div>
        <div class="panel">
          <h2>Export</h2>
          <pre id="export-output">No export yet.</pre>
        </div>
      </section>

      <section class="panel">
        <h2>Schema UML</h2>
        <div id="diagram">Loading UML...</div>
      </section>

      <section class="panel">
        <h2>Edit Property</h2>

        <input id="slot-name" placeholder="slot name (e.g. project_phase)" />

        <select id="slot-type"></select>

        <label>
          <input type="checkbox" id="slot-required" />
          Required
        </label>

        <label>
          <input type="checkbox" id="slot-multi" />
          Multivalued
        </label>

        <div class="toolbar">
          <button onclick="saveSlot()">Add / Update Property</button>
          <button onclick="deleteSlot()">Delete Property</button>
        </div>
      </section>

      <section class="panel">
        <h2>Edit Enum Values</h2>

        <input id="new-enum-name" placeholder="New Enum (e.g. MaterialTypeEnum)" />
        <button onclick="createEnum()">Create Enum</button>

        <select id="enum-name"></select>

        <input id="enum-value" placeholder="Value (e.g. tunnel)" />

        <div class="toolbar">
          <button onclick="addEnum()">Add Enum Value</button>
          <button onclick="deleteEnumValue()">Delete Enum Value</button>
        </div>
      </section>
    </main>

    <script>
      window.EXAMPLE_PAYLOAD = {{ example | tojson }};
    </script>

    <script src="/static/js/app.js"></script>

    <script>
      async function loadUML() {
        const diagram = document.getElementById("diagram");

        try {
          const res = await fetch("/schema/uml");
          if (!res.ok) {
            throw new Error("HTTP " + res.status);
          }

          const data = await res.json();

          mermaid.initialize({
            startOnLoad: false,
            theme: "dark"
          });

          const renderResult = await mermaid.render(
            "umlDiagramSvg_" + Date.now(),
            data.mermaid
          );

          diagram.innerHTML = renderResult.svg;

          // 🔥 wait for DOM paint
          setTimeout(colorUMLClasses, 50);

        } catch (err) {
          diagram.textContent = "Failed to load UML";
          console.error("UML render error:", err);
        }
      }

      async function loadSchemaOptions() {
        try {
          const res = await fetch("/schema/options");
          if (!res.ok) {
            throw new Error("HTTP " + res.status);
          }

          const data = await res.json();

          const slotType = document.getElementById("slot-type");
          const enumName = document.getElementById("enum-name");

          slotType.innerHTML = "";
          enumName.innerHTML = "";

          const addOption = (select, value) => {
            const opt = document.createElement("option");
            opt.value = value;
            opt.textContent = value;
            select.appendChild(opt);
          };

          data.primitives.forEach(v => addOption(slotType, v));
          data.classes.forEach(v => addOption(slotType, v));
          data.enums.forEach(v => addOption(slotType, v));

          data.enums.forEach(v => addOption(enumName, v));
        } catch (err) {
          console.error("Schema options load error:", err);
        }
      }

      async function saveSlot() {
        const name = document.getElementById("slot-name").value;
        const type = document.getElementById("slot-type").value;
        const required = document.getElementById("slot-required").checked;
        const multivalued = document.getElementById("slot-multi").checked;

        await fetch("/schema/add-slot", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            class_name: "ConstructDataset",
            slot_name: name,
            slot_type: type
          })
        });

        await fetch("/schema/update-slot-flags", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            slot_name: name,
            required: required,
            multivalued: multivalued
          })
        });

        await loadSchemaOptions();
        await loadUML();
      }

      async function deleteSlot() {
        const name = document.getElementById("slot-name").value;

        await fetch("/schema/delete-slot", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            class_name: "ConstructDataset",
            slot_name: name
          })
        });

        await loadSchemaOptions();
        await loadUML();
      }

      async function createEnum() {
        const name = document.getElementById("new-enum-name").value;

        await fetch("/schema/add-enum", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            enum_name: name
          })
        });

        await loadSchemaOptions();
        await loadUML();
      }

      async function addEnum() {
        const enumName = document.getElementById("enum-name").value;
        const value = document.getElementById("enum-value").value;

        await fetch("/schema/add-enum-value", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            enum_name: enumName,
            value: value
          })
        });

        await loadSchemaOptions();
        await loadUML();
      }

      async function deleteEnumValue() {
        const enumName = document.getElementById("enum-name").value;
        const value = document.getElementById("enum-value").value;

        await fetch("/schema/delete-enum-value", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            enum_name: enumName,
            value: value
          })
        });

        await loadSchemaOptions();
        await loadUML();
      }
      async function exportSHACL() {
        const output = document.getElementById("export-output");

        try {
          const res = await fetch("/schema/export/shacl");
          if (!res.ok) {
            throw new Error("HTTP " + res.status);
          }

          const text = await res.text();
          output.textContent = text;
        } catch (err) {
          output.textContent = "Failed to export SHACL";
          console.error("SHACL export error:", err);
        }
      }

      async function exportSchemaRDF() {
        const output = document.getElementById("export-output");

        try {
          const res = await fetch("/schema/export/rdf");
          if (!res.ok) {
            throw new Error("HTTP " + res.status);
          }

          const text = await res.text();
          output.textContent = text;
        } catch (err) {
          output.textContent = "Failed to export Schema RDF";
          console.error("Schema RDF export error:", err);
        }
      }

      
      function colorUMLClasses() {
        const svg = document.querySelector("#diagram svg");
        if (!svg) return;

        const cxClasses = new Set(["ConstructDataset"]);

        const nodes = svg.querySelectorAll("g");

        nodes.forEach(node => {
          const text = node.textContent || "";

          // detect class by name appearing in group
          if (text.includes("ConstructDataset")) {
            const rect = node.querySelector("rect");
            if (rect) {
              rect.style.fill = "#7c3aed";
              rect.style.stroke = "#c4b5fd";
              rect.style.strokeWidth = "3px";
            }
          }

          // base classes (optional)
          if (
            text.includes("Dataset") ||
            text.includes("Distribution") ||
            text.includes("Catalog")
          ) {
            const rect = node.querySelector("rect");
            if (rect) {
              rect.style.fill = "#334155";
              rect.style.stroke = "#94a3b8";
            }
          }
        });
      }

      
      window.addEventListener("DOMContentLoaded", async () => {
        await loadSchemaOptions();
        await loadUML();
      });
    </script>
  </body>
</html>
