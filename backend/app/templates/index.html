<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Construct-DCAT Starter</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Construct-DCAT Onboarding</h1>
        <p>No npm required. Edit the JSON payload, validate it, export RDF, and discuss schema changes visually.</p>
      </header>

      <section class="panel">
        <div class="toolbar">
          <button id="load-example">Load example</button>
          <button id="validate">Validate</button>
          <button id="export-jsonld">Export JSON-LD</button>
          <button id="export-turtle">Export Turtle</button>
        </div>
        <label for="payload">Dataset payload</label>
        <textarea id="payload" spellcheck="false">{{ example | tojson(indent=2) }}</textarea>
      </section>

      <section class="grid">
        <div class="panel">
          <h2>Validation</h2>
          <pre id="validation-output">Ready.</pre>
        </div>
        <div class="panel">
          <h2>Export</h2>
          <pre id="export-output">No export yet.</pre>
        </div>
      </section>

      <section class="panel">
        <h2>Schema UML</h2>
        <div id="diagram">Loading UML...</div>
      </section>

      <section class="panel">
        <h2>Edit Property</h2>
        <input id="slot-name" placeholder="slot name (e.g. project_phase)" />
        <input id="slot-type" placeholder="type (e.g. string, Distribution, AssetKindEnum)" />

        <label>
          <input type="checkbox" id="slot-required" />
          Required
        </label>

        <label>
          <input type="checkbox" id="slot-multi" />
          Multivalued
        </label>

        <div class="toolbar">
          <button onclick="saveSlot()">Add / Update Property</button>
          <button onclick="deleteSlot()">Delete Property</button>
        </div>
      </section>

      <section class="panel">
        <h2>Edit Enum</h2>
        <input id="enum-name" placeholder="Enum (e.g. AssetKindEnum)" />
        <input id="enum-value" placeholder="Value (e.g. tunnel)" />

        <div class="toolbar">
          <button onclick="addEnum()">Add Enum Value</button>
          <button onclick="deleteEnumValue()">Delete Enum Value</button>
        </div>
      </section>
    </main>

    <script>
      window.EXAMPLE_PAYLOAD = {{ example | tojson }};
    </script>

    <script src="/static/js/app.js"></script>

    <script>
      async function loadUML() {
        const diagram = document.getElementById("diagram");

        try {
          const res = await fetch("/schema/uml");
          if (!res.ok) {
            throw new Error("HTTP " + res.status);
          }

          const data = await res.json();

          mermaid.initialize({ startOnLoad: false });
          const { svg } = await mermaid.render("umlDiagramSvg", data.mermaid);
          diagram.innerHTML = svg;
        } catch (err) {
          diagram.textContent = "Failed to load UML";
          console.error("UML render error:", err);
        }
      }

      async function saveSlot() {
        const name = document.getElementById("slot-name").value;
        const type = document.getElementById("slot-type").value;
        const required = document.getElementById("slot-required").checked;
        const multivalued = document.getElementById("slot-multi").checked;

        await fetch("/schema/add-slot", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            class_name: "ConstructDataset",
            slot_name: name,
            slot_type: type
          })
        });

        await fetch("/schema/update-slot-flags", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            slot_name: name,
            required: required,
            multivalued: multivalued
          })
        });

        loadUML();
      }

      async function deleteSlot() {
        const name = document.getElementById("slot-name").value;

        await fetch("/schema/delete-slot", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            class_name: "ConstructDataset",
            slot_name: name
          })
        });

        loadUML();
      }

      async function addEnum() {
        const enumName = document.getElementById("enum-name").value;
        const value = document.getElementById("enum-value").value;

        await fetch("/schema/add-enum-value", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            enum_name: enumName,
            value: value
          })
        });

        loadUML();
      }

      async function deleteEnumValue() {
        const enumName = document.getElementById("enum-name").value;
        const value = document.getElementById("enum-value").value;

        await fetch("/schema/delete-enum-value", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            enum_name: enumName,
            value: value
          })
        });

        loadUML();
      }

      window.addEventListener("DOMContentLoaded", loadUML);
    </script>
  </body>
</html>
