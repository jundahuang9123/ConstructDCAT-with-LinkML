id: https://example.org/linkml/construct-dcat
name: construct_dcat
title: Construct-DCAT extension
prefixes:
  cx: https://example.org/construct-dcat/
  dcat: http://www.w3.org/ns/dcat#
imports:
- dcat_ap_base
default_prefix: cx
classes:
  ConstructDataset:
    is_a: Dataset
    slots:
    - asset_kind
    - lifecycle_phase
    - bim_model_ref
    - aas_ref
    - geometry_format
slots:
  asset_kind:
    slot_uri: cx:assetKind
    range: AssetKindEnum
  lifecycle_phase:
    slot_uri: cx:lifecyclePhase
    range: LifecyclePhaseEnum
  bim_model_ref:
    slot_uri: cx:bimModelReference
    range: anyURI
  aas_ref:
    slot_uri: cx:aasReference
    range: anyURI
  geometry_format:
    slot_uri: cx:geometryFormat
    range: GeometryFormatEnum
enums:
  AssetKindEnum:
    permissible_values:
      building: null
      bridge: null
      tunnel: null
      road: null
      hvac_system: null
  LifecyclePhaseEnum:
    permissible_values:
      design: null
      construction: null
      operation: null
      demolition: null
  GeometryFormatEnum:
    permissible_values:
      ifc: null
      gltf: null
      obj: null
      pointcloud: null
